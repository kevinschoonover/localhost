services:
  # Sonarr: Smart PVR for usenet and bittorrent users. Monitors multiple RSS feeds for new TV show episodes, automatically grabbing, sorting, and renaming them.
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: ${CONTAINER_PREFIX}sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/sonarr:/config
      - ${DATA_PATH}:/data
    ports:
      - 8989:8989
    restart: ${RESTART_POLICY}

  # Radarr: A fork of Sonarr to work with movies. Automatically monitors and downloads movies, handles quality upgrades, and manages your movie collection with an elegant web interface.
  radarr:
    image: linuxserver/radarr:latest
    container_name: ${CONTAINER_PREFIX}radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/radarr:/config
      - ${DATA_PATH}:/data
    ports:
      - 7878:7878
    restart: ${RESTART_POLICY}

  # Lidarr: A music collection manager for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new albums from your favorite artists and will interface with clients and indexers to grab, sort, and rename them.
  lidarr:
    image: linuxserver/lidarr:latest
    container_name: ${CONTAINER_PREFIX}lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/lidarr:/config
      - ${DATA_PATH}:/data
    ports:
      - 8686:8686
    restart: ${RESTART_POLICY}

  # Prowlarr: A powerful indexer manager/proxy built on the arr stack. Seamlessly integrates with Sonarr, Radarr, Lidarr, and Readarr, supporting both Torrent Trackers and Usenet Indexers with centralized management.
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: ${CONTAINER_PREFIX}prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/prowlarr:/config
    ports:
      - 9696:9696
    restart: ${RESTART_POLICY}

  # Bazarr: A companion application to Sonarr and Radarr that manages and downloads subtitles.
  bazarr:
    image: linuxserver/bazarr:latest
    container_name: ${CONTAINER_PREFIX}bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/bazarr:/config
      - ${DATA_PATH}/media:/data/media
    ports:
      - 6767:6767
    restart: ${RESTART_POLICY}

  # Jellyfin: A free software media system that puts you in control of managing and streaming your media. It is an alternative to the proprietary Emby and Plex, with no premium features behind a paywall.
  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: ${CONTAINER_PREFIX}jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/jellyfin:/config
      - ${DATA_PATH}/media:/data/media
    ports:
      - 8096:8096
    restart: ${RESTART_POLICY}

  # NZBGet: Efficient usenet downloader, optimized for reliability, completeness, and speed.
  nzbget:
    image: linuxserver/nzbget:latest
    container_name: ${CONTAINER_PREFIX}nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/nzbget:/config
      - ${DATA_PATH}/usenet:/data/usenet
    ports:
      - 6789:6789
    restart: ${RESTART_POLICY}

  # Seerr: A self-hosted media request system for Sonarr, Radarr, Lidarr, and Readarr. It provides a user-friendly interface for managing media requests, allowing users to easily request new content and track the status of their requests.
  seerr:
    image: "ghcr.io/seerr-team/seerr:latest"
    container_name: ${CONTAINER_PREFIX}seerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_PATH}/nzbget:/config
      - ${DATA_PATH}/usenet:/data/usenet
    ports:
      - 6789:6789
    restart: ${RESTART_POLICY}
